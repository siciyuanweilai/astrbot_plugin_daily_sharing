<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>愿此见闻温柔你的日常</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Daily Sharing</p>
          <h1>愿此见闻温柔你的日常</h1>
        </div>
        <div class="topbar-actions">
          <label class="switch" title="自动分享">
            <input id="autoToggle" type="checkbox" />
            <span></span>
          </label>
          <button id="refreshButton" class="icon-button" type="button" title="刷新" aria-label="刷新">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2M3 12A9 9 0 0 1 18.5 5.8"/><path d="M21 4v6h-6M3 20v-6h6"/></svg>
          </button>
        </div>
      </header>

      <section class="status-grid" aria-label="运行状态">
        <article class="metric">
          <span>自动分享</span>
          <strong id="enabledText">--</strong>
        </article>
        <article class="metric">
          <span>当前时段</span>
          <strong id="periodText">--</strong>
        </article>
        <article class="metric">
          <span>定时任务</span>
          <strong id="jobsText">--</strong>
        </article>
        <article class="metric">
          <span>接收目标</span>
          <strong id="targetsText">--</strong>
        </article>
      </section>

      <section class="workspace">
        <div class="primary-column">
          <div class="control-grid">
            <section class="panel action-panel" aria-label="执行分享">
              <div class="panel-head">
                <h2>手动执行</h2>
                <span id="busyText" class="badge">--</span>
              </div>
              <form id="runForm" class="run-form">
                <label>
                  <span>目标</span>
                  <select id="runTarget">
                    <option value="broadcast">群聊 / 私聊</option>
                    <option value="qzone">QQ 空间</option>
                    <option value="briefing">早报</option>
                  </select>
                </label>
                <label>
                  <span>类型</span>
                  <select id="shareType">
                    <option value="auto">自动</option>
                    <option value="greeting">问候</option>
                    <option value="news">新闻</option>
                    <option value="mood">心情</option>
                    <option value="knowledge">知识</option>
                    <option value="recommendation">推荐</option>
                  </select>
                </label>
                <label>
                  <span>新闻源</span>
                  <select id="newsSource">
                    <option value="">自动</option>
                  </select>
                </label>
                <button id="runButton" class="primary" type="submit">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 5 11 7-11 7Z"/></svg>
                  执行
                </button>
              </form>
              <div id="notice" class="notice" hidden></div>
            </section>

            <section class="panel" aria-label="配置概览">
              <div class="panel-head">
                <h2>配置</h2>
              </div>
              <dl class="config-list" id="configList"></dl>
            </section>
          </div>

          <section class="panel wide" aria-label="目标">
            <div class="panel-head">
              <h2>目标</h2>
              <div class="segments" role="tablist" aria-label="目标类型">
                <button class="segment active" type="button" data-target-tab="share">分享</button>
                <button class="segment" type="button" data-target-tab="briefing">早报</button>
              </div>
            </div>
            <div id="targetList" class="target-list"></div>
          </section>

          <section class="panel wide" aria-label="历史">
            <div class="panel-head">
              <h2>历史</h2>
              <button id="historyButton" class="text-button" type="button">更多</button>
            </div>
            <div id="historyList" class="history-list"></div>
          </section>
        </div>

        <aside class="side-column">
          <section class="panel" aria-label="定时任务">
            <div class="panel-head">
              <h2>任务</h2>
            </div>
            <div id="jobList" class="job-list"></div>
          </section>

          <section class="panel" aria-label="执行记录">
            <div class="panel-head">
              <h2>执行记录</h2>
            </div>
            <div id="actionList" class="action-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
